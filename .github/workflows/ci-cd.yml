name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/flask-cicd-app
  KUBERNETES_NAMESPACE: flask-app

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t $DOCKER_IMAGE_NAME:${{ github.sha }} .

      - name: Tag Latest
        run: docker tag $DOCKER_IMAGE_NAME:${{ github.sha }} $DOCKER_IMAGE_NAME:latest

      - name: Push Docker Image
        run: |
          docker push $DOCKER_IMAGE_NAME:${{ github.sha }}
          docker push $DOCKER_IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Kind Kubernetes cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.20.0"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Wait for cluster to be ready
        run: |
          echo "🚀 Setting up Kubernetes Cluster..."
          kubectl cluster-info
          kubectl version --short || kubectl version
          kubectl wait --for=condition=Ready nodes --all --timeout=60s
          echo "✅ Kubernetes cluster is ready!"

      - name: Create Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Update Deployment Image
        run: |
          sed -i 's|image: DOCKER_USERNAME/flask-cicd-app:latest|image: ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}|g' k8s/deployment.yaml

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/flask-deployment -n $KUBERNETES_NAMESPACE --timeout=300s

      - name: Verify Deployment
        run: |
          kubectl get deployments -n $KUBERNETES_NAMESPACE
          kubectl get pods -n $KUBERNETES_NAMESPACE
          kubectl get services -n $KUBERNETES_NAMESPACE